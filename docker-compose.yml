version: '3.8'

services:
  app:
    user: "${DOCKER_UID}:${DOCKER_GID}"
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: export_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis
    networks:
      - export_network

  web:
    image: nginx:alpine
    container_name: export_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - export_network

  db:
    image: mysql:8.0
    container_name: export_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      # MYSQL_PASSWORD: ${DB_PASSWORD}
      # MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - export_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: export_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - export_network

  redis:
    image: redis:alpine
    container_name: export_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - export_network

networks:
  export_network:
    driver: bridge

volumes:
  db_data:
  redis_data: